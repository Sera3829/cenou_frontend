# Build et publication automatique de l'APK Android à chaque push sur main.
# (Secrets configurés et corrigés le 11/07/2026.)
#
# À chaque push :
#   1. Build release signé : flutter build apk --split-per-abi --release
#   2. L'APK arm64-v8a est renommé Cenou.Room.apk
#   3. Il remplace l'asset de la release v1.0.0 → l'URL de téléchargement
#      de la landing page reste stable :
#      https://github.com/Sera3829/cenou_frontend/releases/download/v1.0.0/Cenou.Room.apk
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   GOOGLE_SERVICES_JSON       contenu du fichier google-services.json (Firebase)
#   ANDROID_KEYSTORE_BASE64    keystore de release encodé en base64
#   ANDROID_KEYSTORE_PASSWORD  mot de passe du keystore
#   ANDROID_KEY_ALIAS          alias de la clé (cenou)
#   ANDROID_KEY_PASSWORD       mot de passe de la clé

name: Android APK Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'screenshots/**'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apk-release
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restaurer google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::Secret GOOGLE_SERVICES_JSON manquant — coller le contenu du google-services.json Firebase (app Android com.cenou.mobile)."
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          # Validation immédiate : JSON bien formé et bon package
          python3 -m json.tool android/app/google-services.json > /dev/null || {
            echo "::error::GOOGLE_SERVICES_JSON n'est pas un JSON valide (collage incomplet ?)"; exit 1; }
          grep -q '"package_name": *"com.cenou.mobile"' android/app/google-services.json || {
            echo "::error::GOOGLE_SERVICES_JSON ne contient pas l'app Android com.cenou.mobile"; exit 1; }
          echo "✅ google-services.json valide"

      - name: Restaurer la clé de signature
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::Secret ANDROID_KEYSTORE_BASE64 manquant — voir CENOU-keys/keystore-base64.txt."
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d ' \n\r' | base64 -d > "$RUNNER_TEMP/cenou-release.jks" 2>/dev/null || {
            echo "::error::ANDROID_KEYSTORE_BASE64 n'est pas du base64 valide — recopier TOUT le contenu de keystore-base64.txt (une seule longue ligne)."; exit 1; }

          # Le fichier décodé doit correspondre exactement au keystore d'origine
          # (empreinte non secrète, calculée sur le fichier local de référence)
          EXPECTED_SHA256="a75906db1b7562cac365561780b116f714d46f68116870c27b9d3add3275ce96"
          ACTUAL_SHA256=$(sha256sum "$RUNNER_TEMP/cenou-release.jks" | cut -d' ' -f1)
          ACTUAL_SIZE=$(stat -c%s "$RUNNER_TEMP/cenou-release.jks")
          echo "Keystore décodé : $ACTUAL_SIZE octets (attendu : 2175), sha256=$ACTUAL_SHA256"
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 incomplet ou altéré — recopier TOUT le contenu de keystore-base64.txt sans espace ni retour à la ligne ajouté."
            exit 1
          fi

          # Le mot de passe ouvre-t-il le keystore ?
          keytool -list -keystore "$RUNNER_TEMP/cenou-release.jks" \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > /dev/null 2>&1 || {
            echo "::error::ANDROID_KEYSTORE_PASSWORD incorrect — copier UNIQUEMENT la valeur après 'storePassword=' dans key.properties.txt (sans le préfixe)."; exit 1; }

          # L'alias existe-t-il ?
          keytool -list -keystore "$RUNNER_TEMP/cenou-release.jks" \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.ANDROID_KEY_ALIAS }}" > /dev/null 2>&1 || {
            echo "::error::ANDROID_KEY_ALIAS incorrect — la valeur doit être exactement : cenou"; exit 1; }

          echo "✅ Keystore valide (fichier, mot de passe et alias corrects)"

      - name: Build APK (release, split par ABI)
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/cenou-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter pub get
          flutter build apk --split-per-abi --release

      - name: Publier Cenou.Room.apk (release v1.0.0)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk Cenou.Room.apk
          gh release upload v1.0.0 Cenou.Room.apk --clobber
          echo "✅ APK publié : https://github.com/${{ github.repository }}/releases/download/v1.0.0/Cenou.Room.apk"

      # Les autres ABI restent disponibles en artefacts du workflow (30 jours)
      - uses: actions/upload-artifact@v4
        with:
          name: apk-toutes-abi
          path: build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 30
