name: cenou_mobile
description: Application mobile CENOU pour la gestion locative
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter_localizations:
      sdk: flutter
  local_auth: ^3.0.0
  flutter_phoenix: ^1.1.1
  connectivity_plus: ^7.0.0
  # l'export PDF
  pdf: ^3.10.10
  printing: ^5.13.4
  # Pour l'export Excel/CSV
  csv: ^5.0.2
  badges: ^3.1.2

  # Pour partager le fichier
  share_plus: ^12.0.1

  # Pour picker de fichiers
  file_picker: ^8.0.0

  # Pour les rapports
  open_file: ^3.3.3

  flutter:
    sdk: flutter
  # UI & Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1

  # HTTP & API & IMG
  http: ^1.2.0
  dio: ^5.4.0
  image: ^4.2.0

  # State Management
  provider: ^6.1.1

  # Stockage local
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0

  # Navigation
  go_router: ^17.0.0

  # 🔥 Firebase (versions modernes stables)
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  flutter_local_notifications: ^21.0.0

  # Images & Media
  image_picker: ^1.1.0
  image_cropper: ^12.2.0
  photo_view: ^0.15.0

  # Paiement Mobile Money
  url_launcher: ^6.2.4
  webview_flutter: ^4.5.0

  # Utils
  intl: ^0.20.2
  flutter_dotenv: ^6.0.0
  path_provider: ^2.1.2
  permission_handler: ^12.0.1

  # UI Components
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0
  flutter_spinkit: ^5.2.0
  fluttertoast: ^9.0.0

  # PDF Viewer (pour reçus)
  flutter_pdfview: ^1.3.2

  # NOUVELLES pour dashboard web
  syncfusion_flutter_charts: ^33.1.47    # Graphiques
  data_table_2: ^2.6.0                   # Tableaux avancés
  universal_platform: ^1.1.0             # Détection plateforme
  responsive_framework: ^1.5.1           # Design responsive

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env
    - assets/images/logo_orange.png
    - assets/images/logo_moov.png

  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Regular.ttf
        - asset: fonts/Poppins-Medium.ttf
          weight: 500
        - asset: fonts/Poppins-Bold.ttf
          weight: 700