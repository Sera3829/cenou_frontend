<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Cenou Room - Gestion de résidences universitaires CENOU">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Cenou Room">
  <link rel="apple-touch-icon" href="icons/icon_192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon_32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon_16.png">
  <link rel="shortcut icon" href="icons/favicon_32.png">

  <title>Cenou Room</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1E3A8A; }

    #mobile-block {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #1E3A8A;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }
    #mobile-block img {
      width: 96px; height: 96px;
      border-radius: 22px;
      margin-bottom: 24px;
    }
    #mobile-block h1 { font-size: 22px; margin-bottom: 12px; font-weight: bold; }
    #mobile-block p  { font-size: 15px; opacity: 0.85; max-width: 320px; line-height: 1.6; }
    #mobile-block .badge {
      margin-top: 28px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<!-- Écran de blocage mobile (caché par défaut, affiché si téléphone détecté) -->
<div id="mobile-block">
  <img src="icons/icon_192.png" alt="Cenou Room">
  <h1>Cenou Room</h1>
  <p>
    Cette application de gestion est réservée aux ordinateurs.<br>
    Veuillez utiliser l'application mobile Cenou Room.
  </p>
  <div class="badge">📱 Téléchargez l'application Cenou Room</div>
</div>

<!-- Détection mobile et blocage -->
<script>
  (function () {
    var ua         = navigator.userAgent || navigator.vendor || window.opera;
    var uaLower    = ua.toLowerCase();

    // Téléphones (pas tablettes)
    var isPhone    = /iphone|ipod|(android.*mobile)|windows phone|blackberry|iemobile|opera mini/i.test(uaLower);

    // iPads (autorisés comme les PC)
    var isIpad     = /ipad/i.test(uaLower) ||
                     (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    // Petit écran portrait = probablement un téléphone
    var isSmall    = window.screen.width < 768 && window.screen.height < 1024;

    var shouldBlock = (isPhone && !isIpad) || (isSmall && !isIpad);

    if (shouldBlock) {
      document.getElementById('mobile-block').style.display = 'flex';
      // Empêche Flutter de démarrer
      window._flutter_web_auto_start = false;
    }
  })();
</script>

<!-- Chargement Flutter uniquement sur non-mobile -->
<script>
  (function () {
    var ua         = navigator.userAgent || navigator.vendor || window.opera;
    var uaLower    = ua.toLowerCase();

    var isPhone    = /iphone|ipod|(android.*mobile)|windows phone|blackberry|iemobile|opera mini/i.test(uaLower);
    var isIpad     = /ipad/i.test(uaLower) ||
                     (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    var isSmall    = window.screen.width < 768 && window.screen.height < 1024;

    var shouldBlock = (isPhone && !isIpad) || (isSmall && !isIpad);

    if (!shouldBlock) {
      var s    = document.createElement('script');
      s.src    = 'flutter_bootstrap.js';
      s.async  = true;
      document.body.appendChild(s);
    }
  })();
</script>

</body>
</html>
