<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="cenou_mobile">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>cenou_mobile</title>
  <link rel="manifest" href="manifest.json">

  <!-- Bloquer l'accès au web depuis un navigateur mobile -->
  <script>
    (function() {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      var isMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(ua.toLowerCase());

      if (isMobile) {
        document.addEventListener('DOMContentLoaded', function() {
          document.body.style.margin = '0';
          document.body.style.padding = '0';
          document.body.innerHTML = `
            <div style="
              display:flex; flex-direction:column; align-items:center;
              justify-content:center; height:100vh; background:#1E3A8A;
              color:white; font-family:Arial,sans-serif; text-align:center; padding:24px;
              box-sizing:border-box;
            ">
              <div style="font-size:64px; margin-bottom:24px;">🖥️</div>
              <h1 style="font-size:24px; margin-bottom:16px;">Application réservée aux ordinateurs</h1>
              <p style="font-size:16px; opacity:0.8; max-width:400px; line-height:1.5;">
                Ce tableau de bord CENOU est uniquement accessible depuis un ordinateur.
                Veuillez utiliser l'application mobile CENOU.
              </p>
            </div>`;
        });
        // Bloquer le chargement de Flutter
        window._flutter_web_auto_start = false;
        document.addEventListener('DOMContentLoaded', function() {
          // Supprimer tous les scripts Flutter qui pourraient charger
          var scripts = document.querySelectorAll('script[src*="flutter"]');
          scripts.forEach(function(s) { s.remove(); });
        });
        // Lancer l'affichage immédiatement sans attendre DOMContentLoaded
        window.stop(); // ✅ Arrête le chargement de la page immédiatement
      }
    })();
  </script>
</head>
<body>
<script src="flutter_bootstrap.js" async></script>
</body>
</html>
