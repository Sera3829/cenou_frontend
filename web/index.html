<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="cenou_mobile">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Dashboard CENOU Admin</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1E3A8A; }
    #mobile-block {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #1E3A8A;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }
    #mobile-block .icon { font-size: 64px; margin-bottom: 24px; }
    #mobile-block h1 { font-size: 24px; margin-bottom: 16px; font-weight: bold; }
    #mobile-block p { font-size: 16px; opacity: 0.8; max-width: 400px; line-height: 1.5; }
    #mobile-block .badge {
      margin-top: 32px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<!-- Écran de blocage mobile (caché par défaut) -->
<div id="mobile-block">
  <div class="icon">🖥️</div>
  <h1>Application réservée aux ordinateurs</h1>
  <p>
    Ce tableau de bord CENOU est uniquement accessible depuis un ordinateur.
    Veuillez utiliser l'application mobile CENOU.
  </p>
  <div class="badge">📱 Téléchargez l'application CENOU Mobile</div>
</div>

<!-- Détection et blocage mobile -->
<script>
  (function() {
    var ua = navigator.userAgent || navigator.vendor || window.opera;
    var uaLower = ua.toLowerCase();

    // Détecter les téléphones (pas les tablettes)
    var isPhone = /iphone|ipod|(android.*mobile)|windows phone|blackberry|iemobile|opera mini/i.test(uaLower);

    // Détecter iPad explicitement (tablette = autorisée)
    var isIpad = /ipad/i.test(uaLower) ||
                 (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    // Vérification supplémentaire par taille d'écran
    // Téléphone = largeur < 768px ET hauteur < 1024px ET pas une tablette connue
    var isSmallScreen = window.screen.width < 768 && window.screen.height < 1024;

    // Bloquer uniquement si c'est un téléphone ET pas une tablette
    var shouldBlock = (isPhone && !isIpad) || (isSmallScreen && !isIpad);

    if (shouldBlock) {
      // Afficher immédiatement l'écran de blocage
      var block = document.getElementById('mobile-block');
      if (block) {
        block.style.display = 'flex';
      }
      // Empêcher Flutter de démarrer
      window._flutter_web_auto_start = false;
    }
  })();
</script>

<!-- Chargement Flutter uniquement si pas un téléphone -->
<script>
  (function() {
    var ua = navigator.userAgent || navigator.vendor || window.opera;
    var uaLower = ua.toLowerCase();

    var isPhone = /iphone|ipod|(android.*mobile)|windows phone|blackberry|iemobile|opera mini/i.test(uaLower);

    var isIpad = /ipad/i.test(uaLower) ||
                 (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    var isSmallScreen = window.screen.width < 768 && window.screen.height < 1024;

    var shouldBlock = (isPhone && !isIpad) || (isSmallScreen && !isIpad);

    if (!shouldBlock) {
      var script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      script.async = true;
      document.body.appendChild(script);
    }
  })();
</script>

</body>
</html>
